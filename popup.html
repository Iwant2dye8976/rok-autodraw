<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>Lilith Auto</title>
</head>

<body>
  <nav class="g-nav">
    <span class="g-nav-brand">Lilith Auto</span>
    <div class="status-pill">
      <span class="status-dot" id="statusDot"></span>
      <span id="status">Chưa có token</span>
    </div>
  </nav>
  <div id="main">
    <div class="card glass">
      <div class="card-head">
        <div class="eyebrow-row">
          <div class="eyebrow">Thao tác</div>
          <div class="radio-group">
            <label class="radio-pill">
              <input type="radio" name="store" value="plutomall" checked>
              <span>Plutomall</span>
            </label>
            <label class="radio-pill">
              <input type="radio" name="store" value="lilithstore">
              <span>Lilith Store</span>
            </label>
          </div>
        </div>
      </div>
      <div class="card-body">
        <div class="btn-row">
          <button class="btn-util" id="captureBtn">🔑 Lấy Token</button>
          <button class="btn-util" id="refreshCharsBtn">↺ Làm mới</button>
        </div>
        <div class="btn-row">
          <button class="btn-pill" id="drawNowBtn">✦ Quay thưởng ngay</button>
        </div>
      </div>
    </div>

    <div class="card glass">
      <div class="card-head">
        <div class="eyebrow-row">
          <div class="eyebrow">Nhân vật</div>
          <span class="draws-remaining" id="drawsRemaining">— lượt còn lại</span>
        </div>
      </div>
      <div class="card-body">
        <div class="char-list-inner" id="charList">
          <div class="char-row">
            <span class="badge badge-warn">Chưa có token</span>
          </div>
        </div>
      </div>
    </div>

    <div class="card glass">
      <div class="card-head">
        <div class="eyebrow">Token</div>
      </div>
      <div class="card-body">
        <textarea id="tokenBox" readonly placeholder="Token sẽ hiện ở đây sau khi lấy…"></textarea>
      </div>
    </div>

    <div id="logWrap" style="display:none">
      <div class="eyebrow" style="padding:0 2px 6px">Nhật ký</div>
      <div id="log"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
