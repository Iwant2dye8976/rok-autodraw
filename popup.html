<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>Lilith Auto Draw</title>
</head>
<body>
  <nav class="g-nav">
    <span class="g-nav-brand">Lilith Auto Draw</span>
    <div class="status-pill">
      <span class="status-dot" id="statusDot"></span>
      <span id="status">No token</span>
    </div>
  </nav>
  <div id="main">
    <div class="card glass">
      <div class="card-head">
        <div class="eyebrow">Thao tác</div>
      </div>
      <div class="card-body">
        <div class="btn-row">
          <button class="btn-util" id="captureBtn">🔑 Capture Token</button>
          <button class="btn-util" id="refreshCharsBtn">↺ Làm mới</button>
        </div>
        <div class="btn-row">
          <button class="btn-pill" id="drawNowBtn">✦ Quay thưởng ngay</button>
        </div>
      </div>
    </div>

    <div class="card glass">
      <div class="card-head">
        <div class="eyebrow">Nhân vật</div>
      </div>
      <div class="card-body">
        <div class="char-list-inner" id="charList">
          <div class="char-row">
            <span class="badge badge-warn">Chưa có token</span>
          </div>
        </div>
      </div>
    </div>

    <div class="card glass">
      <div class="card-head">
        <div class="eyebrow">Token</div>
      </div>
      <div class="card-body">
        <textarea id="tokenBox" readonly placeholder="Token sẽ hiện ở đây sau khi capture…"></textarea>
      </div>
    </div>

    <div id="logWrap" style="display:none">
      <div class="eyebrow" style="padding:0 2px 6px">Nhật ký</div>
      <div id="log"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
