<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: monospace; padding: 16px; background: #1e1e1e; color: #d4d4d4; }
    h3 { color: #9cdcfe; }
    .section { background: #2d2d2d; padding: 10px; border-radius: 6px; margin-bottom: 10px; }
    .key { color: #9cdcfe; }
    .val { color: #ce9178; word-break: break-all; }
    .empty { color: #666; font-style: italic; }
    button { background: #0e639c; color: white; border: none; padding: 8px 14px; border-radius: 4px; cursor: pointer; margin-right: 8px; margin-bottom: 8px; }
    button:hover { background: #1177bb; }
    #log { white-space: pre-wrap; font-size: 12px; max-height: 300px; overflow-y: auto; }
  </style>
</head>
<body>
  <h3>🔍 Lilith Draw — Debug</h3>

  <button id="refresh">Refresh Storage</button>
  <button id="clear">Clear Storage</button>
  <button id="testDraw">Test Draw Now (skip timer)</button>

  <div class="section">
    <div><span class="key">campaignToken:</span> <span id="v_token" class="empty">—</span></div>
    <div><span class="key">tokenTimestamp:</span> <span id="v_ts" class="empty">—</span></div>
    <div><span class="key">appId:</span> <span id="v_appId" class="empty">—</span></div>
    <div><span class="key">appUid:</span> <span id="v_appUid" class="empty">—</span></div>
    <div><span class="key">roleId:</span> <span id="v_roleId" class="empty">—</span></div>
    <div><span class="key">svrId:</span> <span id="v_svrId" class="empty">—</span></div>
    <div><span class="key">roleName:</span> <span id="v_roleName" class="empty">—</span></div>
    <div><span class="key">iframeSrc:</span> <span id="v_iframeSrc" class="empty">—</span></div>
    <div><span class="key">scheduleInfo:</span> <span id="v_schedule" class="empty">—</span></div>
  </div>

  <div class="section">
    <div><b>Draw Log:</b></div>
    <div id="log" class="empty">—</div>
  </div>

  <script src="debug.js"></script>
</body>
</html>
